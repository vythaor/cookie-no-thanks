<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto decline cookie</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <h1 class="title">Auto decline cookie</h1>

        <!-- Enable Auto decline Card -->
        <div class="card">
            <label class="toggle-row" for="enableToggle">
                <span class="toggle-label">Enable Auto decline</span>
                <div class="toggle-wrap">
                    <input type="checkbox" id="enableToggle" checked>
                    <span class="toggle-track">
                        <span class="toggle-knob">
                            <span class="cookie-mascot" aria-hidden="true">🍪</span>
                        </span>
                    </span>
                </div>
            </label>
        </div>

        <!-- Only shown when cookie was declined on this page -->
        <div id="statusMessage" class="status-message" hidden></div>

        <!-- RESCAN Button -->
        <div class="section">
            <button id="manualTrigger" class="btn-rescan">RESCAN</button>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <a href="#" id="openOptions" class="link-settings">Settings</a>
            <div class="no-thanks-block">
                <span class="no-thanks-text">NO THANKS!</span>
                <div class="no-thanks-illus" aria-hidden="true">
                    <span class="hand-stop">🖐</span><span class="cookie-icon">🍪</span>
                </div>
            </div>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>

</html>
