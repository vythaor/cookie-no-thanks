<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto decline cookie</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <h1 class="title">Auto decline cookie</h1>

        <!-- Enable Auto decline Card -->
        <div class="card power-card">
            <label class="power-btn-wrap" for="enableToggle" aria-label="Toggle Auto Decline">
                <input type="checkbox" id="enableToggle" checked>
                <span class="power-btn">
                    <img src="../icons/icon-power.svg" class="power-icon" alt="" aria-hidden="true">
                </span>
            </label>
            <div class="no-thanks-block">
                <span class="no-thanks-text">NO THANKS!</span>
                <img class="no-thanks-img" src="../icons/img.png" alt="meme">
            </div>
        </div>

        <!-- Only shown when cookie was declined on this page -->
        <div id="statusMessage" class="status-message" hidden></div>

        <!-- RESCAN Button -->
        <div class="section">
            <button id="manualTrigger" class="btn-rescan">RESCAN</button>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <a href="#" id="openOptions" class="link-settings">Settings</a>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>

</html>
